site_name: Atlas Mod Documentation
site_description: Modular StarMade server mod framework
site_url: https://videogoose.github.io/AtlasCore/
repo_url: https://github.com/videogoose/AtlasCore
repo_name: videogoose/AtlasCore

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - toc.integrate
    - search.suggest

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - attr_list

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Modules:
      - AtlasCore: modules/atlas-core.md
      - AtlasGuide: modules/atlas-guide.md
      - AtlasBanking: modules/atlas-banking.md
      - AtlasBuildSectors: modules/atlas-buildsectors.md
      - AtlasExchange: modules/atlas-exchange.md
  - API Guide:
      - Creating a Sub-Mod: api/creating-a-submod.md
      - Custom Data Types: api/data-types.md
      - Mixins: api/mixins.md

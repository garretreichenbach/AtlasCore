name: Build

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      starmade_build_url:
        description: "Optional direct StarMade build zip URL override"
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Temurin JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"
          cache: gradle

      - name: Prepare StarMade compile dependencies
        id: starmade
        env:
          STARMADE_DEV_BASE_URL: http://files-origin.star-made.org/build/dev/
          STARMADE_BUILD_URL: ${{ inputs.starmade_build_url || 'http://files-origin.star-made.org/build/dev/starmade-build_20260319_094639.zip' }}
          STARMADE_DOWNLOAD_PATTERN: ^starmade-build_[0-9]{8}_[0-9]{6}\.zip$
        run: bash .github/scripts/prepare_starmade.sh

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.14"

      - name: Build all sub-projects
        run: gradle build -Pstarmade_root="${{ steps.starmade.outputs.starmade_root }}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: atlas-jars
          path: "${{ steps.starmade.outputs.starmade_root }}mods/*.jar"
          retention-days: 7

name: Build

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build all sub-projects
        run: ./gradlew build
        env:
          # Point to a dummy path; jars won't be copied but compilation succeeds
          starmade_root: /tmp/starmade

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: atlas-jars
          path: |
            core/build/libs/*.jar
            guide/build/libs/*.jar
            banking/build/libs/*.jar
            buildsectors/build/libs/*.jar
            exchange/build/libs/*.jar
          retention-days: 7
